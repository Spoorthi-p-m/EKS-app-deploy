---
apiVersion: v1
kind: Namespace
metadata:
  name: eks-demo
---
# ---------- Primary app: your Spring Boot app, served at "/" ----------
apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: eks-demo
  name: deployment-spring-boot
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: spring-boot-app
  replicas: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: spring-boot-app
    spec:
      containers:
      - image: spoorthipm/ultimate-cicd:13   # <-- update to your latest build number
        imagePullPolicy: Always
        name: spring-boot-app
        ports:
        - containerPort: 8080                # Spring Boot's actual port, not 80
        readinessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 10
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /actuator/health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 15
          failureThreshold: 3
        resources:
          requests:
            cpu: "250m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
---
apiVersion: v1
kind: Service
metadata:
  namespace: eks-demo
  name: service-spring-boot
spec:
  ports:
    - port: 80
      targetPort: 8080                       # forwards ALB traffic to container's 8080
      protocol: TCP
  type: NodePort
  selector:
    app.kubernetes.io/name: spring-boot-app
---
# ---------- Secondary app: proves the Ingress genuinely shares one ALB ----------
apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: eks-demo
  name: deployment-nginx-demo
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: nginx-demo
  replicas: 2
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nginx-demo
    spec:
      containers:
      - image: public.ecr.aws/nginx/nginx:1.23
        imagePullPolicy: IfNotPresent
        name: nginx-demo
        ports:
        - containerPort: 80
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "250m"
            memory: "256Mi"
---
apiVersion: v1
kind: Service
metadata:
  namespace: eks-demo
  name: service-nginx-demo
spec:
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
  type: NodePort
  selector:
    app.kubernetes.io/name: nginx-demo
---
# ---------- One Ingress, one ALB, routing to BOTH services above ----------
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  namespace: eks-demo
  name: ingress-eks-demo
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
spec:
  ingressClassName: alb
  rules:
    - http:
        paths:
        - path: /
          pathType: Prefix
          backend:
            service:
              name: service-spring-boot
              port:
                number: 80
        - path: /nginx
          pathType: Prefix
          backend:
            service:
              name: service-nginx-demo
              port:
                number: 80
